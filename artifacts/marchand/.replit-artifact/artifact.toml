kind = "mobile"
previewPath = "/"
title = "Marchand"
version = "1.0.0"
id = "artifacts/marchand"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19430

[services.development]
run = "pnpm --filter @workspace/marchand run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marchand", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/marchand", "run", "serve" ]

[services.env]
PORT = "19430"
BASE_PATH = "/"
